<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Manager — <?= trainerName ?></title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg:#f0f4f8;
  --surface:rgba(255,255,255,0.88);
  --border:rgba(255,255,255,0.78);
  --primary:#0d9488; --primary-dark:#0f766e;
  --success:#10b981; --danger:#ef4444; --warning:#f59e0b;
  --text-main:#0d1526; --text-muted:#64748b; --text-soft:#94a3b8;
  --shadow:0 8px 28px -6px rgba(15,23,42,0.09),0 0 0 1px rgba(15,23,42,0.045);
  --shadow-lg:0 20px 50px -10px rgba(15,23,42,0.12),0 0 0 1px rgba(15,23,42,0.04);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;touch-action:manipulation;}
body{background:var(--bg);background-image:radial-gradient(ellipse 75% 55% at 10% 0%,rgba(13,148,136,0.12) 0%,transparent 60%),radial-gradient(ellipse 65% 50% at 90% 100%,rgba(16,185,129,0.09) 0%,transparent 55%);color:var(--text-main);min-height:100vh;padding:1.4rem 1rem 3rem;}
.glow-1{position:fixed;top:-12%;left:-12%;width:52vw;height:52vw;background:radial-gradient(circle,#ccfbf1,#d1fae5);border-radius:50%;filter:blur(90px);opacity:0.55;z-index:0;pointer-events:none;}
.glow-2{position:fixed;bottom:-12%;right:-12%;width:52vw;height:52vw;background:radial-gradient(circle,#a7f3d0,#6ee7b7);border-radius:50%;filter:blur(90px);opacity:0.35;z-index:0;pointer-events:none;}
.wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;}

header{background:linear-gradient(135deg,rgba(255,255,255,0.94) 0%,rgba(240,253,250,0.92) 100%);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.85);border-radius:22px;padding:1.1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:1rem;box-shadow:var(--shadow-lg);}
.logo{font-size:0.9rem;font-weight:900;display:flex;align-items:center;gap:9px;text-transform:uppercase;letter-spacing:4px;color:var(--text-main);opacity:0.82;}
.logo i{color:#92400e;font-size:1.05rem;}
.trainer-badge{background:linear-gradient(135deg,rgba(13,148,136,0.1),rgba(13,148,136,0.06));color:var(--primary);border:1px solid rgba(13,148,136,0.2);padding:7px 16px;border-radius:100px;font-size:0.83rem;font-weight:700;display:flex;align-items:center;gap:7px;}

.tab-bar{background:rgba(255,255,255,0.88);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.8);border-radius:20px;padding:6px;display:flex;gap:6px;margin-bottom:1.2rem;box-shadow:var(--shadow);}
.tab-btn{flex:1;padding:0.75rem 1rem;border:none;border-radius:14px;cursor:pointer;font-size:0.87rem;font-weight:700;color:var(--text-soft);background:transparent;display:flex;align-items:center;justify-content:center;gap:7px;transition:all 0.22s cubic-bezier(0.16,1,0.3,1);font-family:'Inter',sans-serif;}
.tab-btn.active{background:linear-gradient(135deg,rgba(13,148,136,0.12),rgba(13,148,136,0.07));color:var(--primary);box-shadow:0 2px 8px rgba(13,148,136,0.12);}

.card{background:var(--surface);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:20px;padding:1.3rem 1.4rem;margin-bottom:1rem;box-shadow:var(--shadow);}
.sec-label{font-size:0.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:0.9rem;display:flex;align-items:center;gap:7px;}
.sec-num{width:22px;height:22px;border-radius:50%;background:var(--primary);color:#fff;font-size:0.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.branch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.branch-btn{padding:0.85rem 1rem;border:2px solid rgba(15,23,42,0.07);border-radius:14px;background:#fff;cursor:pointer;font-size:0.88rem;font-weight:700;color:var(--text-muted);display:flex;align-items:center;gap:8px;transition:all 0.2s;font-family:'Inter',sans-serif;}
.branch-btn:hover{border-color:rgba(13,148,136,0.3);color:var(--primary);background:rgba(13,148,136,0.04);}
.branch-btn.sel{border-color:var(--primary);color:var(--primary);background:rgba(13,148,136,0.07);box-shadow:0 0 0 3px rgba(13,148,136,0.08);}

.emp-list{display:flex;flex-direction:column;gap:7px;}
.emp-btn{padding:0.75rem 1rem;border:1.5px solid rgba(15,23,42,0.07);border-radius:13px;background:#fff;cursor:pointer;font-size:0.92rem;font-weight:600;color:var(--text-main);display:flex;align-items:center;gap:10px;transition:all 0.2s;font-family:'Inter',sans-serif;text-align:left;}
.emp-btn:hover{border-color:rgba(13,148,136,0.3);background:rgba(13,148,136,0.04);}
.emp-btn.sel{border-color:var(--primary);background:rgba(13,148,136,0.07);color:var(--primary);}
.emp-av{width:34px;height:34px;border-radius:10px;background:rgba(13,148,136,0.1);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:800;flex-shrink:0;}
.emp-btn.sel .emp-av{background:var(--primary);color:#fff;}

.prog-wrap{margin-bottom:1.1rem;}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;}
.prog-lbl{font-size:0.78rem;font-weight:700;color:var(--text-muted);}
.prog-count{font-size:0.9rem;font-weight:800;color:var(--primary);}
.prog-bg{height:7px;background:rgba(15,23,42,0.07);border-radius:100px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--success));border-radius:100px;transition:width 0.4s cubic-bezier(0.16,1,0.3,1);}

.cl-cat-sep{font-size:0.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;padding:8px 0 5px;display:flex;align-items:center;gap:6px;}
.cl-cat-sep::before{content:'';display:inline-block;width:3px;height:11px;background:var(--primary);border-radius:2px;}
.cl-item{background:#fff;border:1.5px solid rgba(15,23,42,0.06);border-radius:14px;margin-bottom:8px;overflow:hidden;transition:border-color 0.2s,background 0.2s;}
.cl-item.chk{border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.03);}
.cl-item-top{display:flex;align-items:center;gap:12px;padding:0.9rem 1rem;cursor:pointer;user-select:none;}
.cl-circle{width:26px;height:26px;border-radius:50%;border:2px solid rgba(15,23,42,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;transition:all 0.22s;}
.cl-circle i{font-size:0.65rem;color:#fff;opacity:0;transition:opacity 0.15s;}
.cl-item.chk .cl-circle{background:var(--success);border-color:var(--success);}
.cl-item.chk .cl-circle i{opacity:1;}
.cl-item-txt{flex:1;font-size:0.9rem;font-weight:600;color:var(--text-main);transition:color 0.2s;}
.cl-item.chk .cl-item-txt{color:var(--text-muted);text-decoration:line-through;}
.cl-cat-tag{font-size:0.7rem;font-weight:700;color:var(--primary);background:rgba(13,148,136,0.08);padding:2px 7px;border-radius:6px;white-space:nowrap;}
.cl-note-wrap{padding:0 1rem 0.85rem;}
.cl-note-input{width:100%;border:1px solid rgba(15,23,42,0.08);border-radius:10px;padding:0.55rem 0.8rem;font-size:0.82rem;font-weight:500;color:var(--text-main);resize:none;outline:none;background:#fff;font-family:'Inter',sans-serif;transition:border-color 0.2s;}
.cl-note-input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(13,148,136,0.07);}

.gen-note{width:100%;border:1.5px solid rgba(15,23,42,0.08);border-radius:12px;padding:0.75rem 1rem;font-size:0.88rem;font-weight:500;color:var(--text-main);resize:vertical;min-height:70px;outline:none;background:#fff;font-family:'Inter',sans-serif;transition:border-color 0.2s;}
.gen-note:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(13,148,136,0.07);}

.submit-btn{width:100%;padding:1rem;border:none;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 20px rgba(13,148,136,0.25);transition:all 0.2s;font-family:'Inter',sans-serif;margin-top:0.5rem;}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(13,148,136,0.3);}
.submit-btn:active{transform:translateY(0);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

.log-card{background:#fff;border:1px solid rgba(15,23,42,0.06);border-radius:16px;padding:1rem 1.1rem;margin-bottom:0.75rem;}
.log-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
.log-emp{font-weight:700;font-size:0.95rem;flex:1;}
.log-dept{font-size:0.75rem;font-weight:700;color:var(--primary);background:rgba(13,148,136,0.08);padding:3px 9px;border-radius:7px;}
.log-time{font-size:0.75rem;font-weight:700;color:var(--text-muted);font-family:monospace;}
.log-score{font-size:0.8rem;font-weight:700;}
.log-note{font-size:0.8rem;color:#92400e;margin-top:6px;padding:6px 9px;background:rgba(245,158,11,0.07);border-radius:9px;border:1px solid rgba(245,158,11,0.15);}

.empty{text-align:center;padding:2.5rem 1rem;color:var(--text-muted);}
.empty i{font-size:2rem;margin-bottom:0.75rem;display:block;opacity:0.35;}
.empty p{font-size:0.88rem;font-weight:500;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0d1526;color:#fff;padding:11px 20px;border-radius:14px;font-size:0.86rem;font-weight:600;z-index:200;opacity:0;transition:all 0.35s cubic-bezier(0.16,1,0.3,1);white-space:nowrap;box-shadow:0 8px 24px rgba(15,23,42,0.2);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{background:#0d9488;}
#toast.err{background:#ef4444;}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="glow-1"></div><div class="glow-2"></div>
<div class="wrap">

<header>
  <div class="logo"><i class="fa-solid fa-mug-hot"></i> Coffeemoon</div>
  <div class="trainer-badge">
    <i class="fa-solid fa-graduation-cap"></i>
    <span id="trainerNameBadge"><?= trainerName ?></span>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" id="tabNew" onclick="switchTab('new')">
    <i class="fa-solid fa-clipboard-list"></i> Yeni Təlim
  </button>
  <button class="tab-btn" id="tabToday" onclick="switchTab('today')">
    <i class="fa-solid fa-clock-rotate-left"></i> Bu gün
  </button>
</div>

<!-- YENİ TREYNİNQ -->
<div id="panelNew">

  <!-- Addım 1: Filial -->
  <div class="card">
    <div class="sec-label"><span class="sec-num">1</span> Filial seçin</div>
    <div class="branch-grid">
      <button class="branch-btn" onclick="selectBranch('Elmlər',this)"><i class="fa-solid fa-store"></i> Elmlər</button>
      <button class="branch-btn" onclick="selectBranch('Sahil',this)"><i class="fa-solid fa-store"></i> Sahil</button>
      <button class="branch-btn" onclick="selectBranch('Gənclik',this)"><i class="fa-solid fa-store"></i> Gənclik</button>
      <button class="branch-btn" onclick="selectBranch('Ağ Şəhər',this)"><i class="fa-solid fa-store"></i> Ağ Şəhər</button>
    </div>
  </div>

  <!-- Addım 2: İşçi -->
  <div class="card hidden" id="empCard">
    <div class="sec-label">
      <span class="sec-num">2</span> İşçi seçin
      <span id="empDeptLbl" style="font-weight:700;color:var(--primary);text-transform:none;letter-spacing:0;margin-left:4px;"></span>
    </div>
    <div class="emp-list" id="empList">
      <div class="empty"><i class="fa-solid fa-circle-notch fa-spin"></i><p>Yüklənir...</p></div>
    </div>
  </div>

  <!-- Addım 3: Çeklist -->
  <div class="card hidden" id="clCard">
    <div class="sec-label">
      <span class="sec-num">3</span> Çeklist
      <span id="clEmpLbl" style="font-weight:700;color:var(--text-main);text-transform:none;letter-spacing:0;margin-left:4px;"></span>
    </div>
    <div class="prog-wrap">
      <div class="prog-header">
        <span class="prog-lbl">Tamamlanma</span>
        <span class="prog-count" id="progCount">0 / 0</span>
      </div>
      <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div id="clItems"></div>
    <div style="margin-top:1.2rem;">
      <div class="sec-label" style="margin-bottom:0.5rem;font-size:0.72rem;">
        <i class="fa-solid fa-note-sticky"></i> Ümumi qeyd (istəyə bağlı)
      </div>
      <textarea class="gen-note" id="generalNote" placeholder="Əlavə qeydlər..."></textarea>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitChecklist()">
      <i class="fa-solid fa-paper-plane"></i> Təlimi Tamamla
    </button>
  </div>

</div><!-- /panelNew -->

<!-- BU GÜN -->
<div id="panelToday" class="hidden">
  <div class="card">
    <div class="sec-label"><i class="fa-solid fa-calendar-check"></i> Bu günkü təlimlər (yoxlanışlar)</div>
    <div id="todayLogs">
      <div class="empty"><i class="fa-solid fa-circle-notch fa-spin"></i><p>Yüklənir...</p></div>
    </div>
  </div>
</div>

</div>
<div id="toast"></div>

<script src="/gsr-shim.js"></script>
<script>
const TRAINER_KEY  = '<?= trainerKey ?>';
const TRAINER_NAME = '<?= trainerName ?>';

let _toastTimer;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'show ' + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ── State ─────────────────────────────────────────────────────────
var selBranch  = null;
var selEmpId   = null;
var selEmpName = null;
var allEmps    = [];  // bütün işçilər (bir dəfə yüklənir)
var allItems   = [];  // çeklist elementləri
var checks     = {};

// ── Tabs ─────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tabNew').classList.toggle('active', tab==='new');
  document.getElementById('tabToday').classList.toggle('active', tab==='today');
  document.getElementById('panelNew').classList.toggle('hidden', tab!=='new');
  document.getElementById('panelToday').classList.toggle('hidden', tab!=='today');
  if (tab==='today') loadTodayLogs();
}

// ── Filial seçimi ─────────────────────────────────────────────────
function selectBranch(dept, btn) {
  document.querySelectorAll('.branch-btn').forEach(function(b){ b.classList.remove('sel'); });
  btn.classList.add('sel');
  selBranch  = dept;
  selEmpId   = null;
  selEmpName = null;

  document.getElementById('empDeptLbl').textContent = '— ' + dept;
  document.getElementById('empCard').classList.remove('hidden');
  document.getElementById('clCard').classList.add('hidden');

  var empList = document.getElementById('empList');
  empList.innerHTML = '<div class="empty"><i class="fa-solid fa-circle-notch fa-spin"></i><p>Yüklənir...</p></div>';

  if (allEmps.length) {
    renderEmpList(dept);
    return;
  }
  // getEmployees() admin paneldə işləyən eyni funksiya
  google.script.run
    .withSuccessHandler(function(data) {
      allEmps = data || [];
      renderEmpList(dept);
    })
    .withFailureHandler(function(e) {
      document.getElementById('empList').innerHTML =
        '<div class="empty"><i class="fa-solid fa-triangle-exclamation"></i><p>Xəta: ' + (e.message||'bilinmir') + '</p></div>';
    })
    .getEmployees();
}

function renderEmpList(dept) {
  var empList = document.getElementById('empList');
  var filtered = allEmps.filter(function(e){ return e.dept === dept; });
  if (!filtered.length) {
    empList.innerHTML = '<div class="empty"><i class="fa-solid fa-users-slash"></i><p>Bu filialda işçi tapılmadı.</p></div>';
    return;
  }
  empList.innerHTML = filtered.map(function(e) {
    return '<button class="emp-btn" onclick="selectEmp(\'' + e.id + '\',\'' + e.name.replace(/'/g,"\\'") + '\',this)">' +
      '<div class="emp-av">' + e.name.charAt(0) + '</div>' +
      '<span>' + e.name + '</span></button>';
  }).join('');
  document.getElementById('empCard').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

// ── İşçi seçimi ──────────────────────────────────────────────────
function selectEmp(id, name, btn) {
  document.querySelectorAll('.emp-btn').forEach(function(b){ b.classList.remove('sel'); });
  btn.classList.add('sel');
  selEmpId   = id;
  selEmpName = name;
  document.getElementById('clEmpLbl').textContent = '— ' + name;

  var clCard = document.getElementById('clCard');
  clCard.classList.remove('hidden');
  document.getElementById('clItems').innerHTML = '<div class="empty"><i class="fa-solid fa-circle-notch fa-spin"></i><p>Yüklənir...</p></div>';

  checks = {};

  if (allItems.length) {
    renderChecklist();
    clCard.scrollIntoView({ behavior:'smooth', block:'start' });
    return;
  }
  google.script.run
    .withSuccessHandler(function(data) {
      allItems = data || [];
      renderChecklist();
      clCard.scrollIntoView({ behavior:'smooth', block:'start' });
    })
    .withFailureHandler(function() {
      allItems = [];
      renderChecklist();
    })
    .getActiveTrainerItems();
}

// ── Çeklist render ────────────────────────────────────────────────
function renderChecklist() {
  const container = document.getElementById('clItems');
  if (!allItems.length) {
    container.innerHTML = '<div class="empty"><i class="fa-solid fa-list-check"></i><p>Çeklist elementi yoxdur.<br>Admin paneldən əlavə edin.</p></div>';
    updateProg();
    return;
  }

  // Kateqoriyaya görə qruplaşdır
  const cats = {};
  allItems.forEach(item => {
    const c = item.category || 'Digər';
    if (!cats[c]) cats[c] = [];
    cats[c].push(item);
  });

  let html = '';
  Object.entries(cats).forEach(([cat, items]) => {
    html += `<div class="cl-cat-sep">${cat}</div>`;
    items.forEach(item => {
      const c = checks[item.id] || {};
      html += `
        <div class="cl-item${c.checked?' chk':''}" id="ci-${item.id}">
          <div class="cl-item-top" onclick="toggleItem('${item.id}')">
            <div class="cl-circle"><i class="fa-solid fa-check"></i></div>
            <span class="cl-item-txt">${item.text}</span>
            <span class="cl-cat-tag">${item.category||''}</span>
          </div>
          <div class="cl-note-wrap">
            <textarea class="cl-note-input" rows="1"
              placeholder="Qeyd əlavə et..."
              id="note-${item.id}"
              oninput="updateNote('${item.id}',this.value)">${c.note||''}</textarea>
          </div>
        </div>`;
    });
  });
  container.innerHTML = html;
  updateProg();
}

function toggleItem(id) {
  if (!checks[id]) checks[id] = { checked:false, note:'' };
  checks[id].checked = !checks[id].checked;
  const el = document.getElementById('ci-' + id);
  if (el) el.classList.toggle('chk', checks[id].checked);
  updateProg();
}

function updateNote(id, val) {
  if (!checks[id]) checks[id] = { checked:false, note:'' };
  checks[id].note = val;
}

function updateProg() {
  const total = allItems.length;
  const done  = allItems.filter(i => checks[i.id]?.checked).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  document.getElementById('progCount').textContent = `${done} / ${total}`;
  document.getElementById('progFill').style.width  = pct + '%';
}

// ── Göndər ───────────────────────────────────────────────────────
function submitChecklist() {
  if (!selBranch)       { toast('Filial seçin.', 'err');  return; }
  if (!selEmpId)        { toast('İşçi seçin.', 'err');    return; }
  if (!allItems.length) { toast('Çeklist boşdur.', 'err'); return; }

  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Göndərilir...';

  var items = allItems.map(function(item) {
    return {
      id:       item.id,
      text:     item.text,
      category: item.category,
      checked:  (checks[item.id] && checks[item.id].checked) || false,
      note:     (checks[item.id] && checks[item.id].note)    || '',
    };
  });

  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Təlimi Tamamla';
      if (res && res.success) {
        toast('Təlim qeyd edildi ✓', 'ok');
        resetForm();
      } else {
        toast((res && res.reason) || 'Xəta baş verdi.', 'err');
      }
    })
    .withFailureHandler(function(e) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Təlimi Tamamla';
      toast('Xəta: ' + (e.message||'bilinmir'), 'err');
    })
    .submitTrainerLog(TRAINER_KEY, TRAINER_NAME, selBranch, selEmpId, selEmpName, items,
      document.getElementById('generalNote').value.trim());
}

function resetForm() {
  selEmpId = null; selEmpName = null; checks = {};
  document.getElementById('clCard').classList.add('hidden');
  document.getElementById('empCard').classList.add('hidden');
  document.querySelectorAll('.branch-btn').forEach(b => b.classList.remove('sel'));
  selBranch = null;
  document.getElementById('generalNote').value = '';
  window.scrollTo({ top:0, behavior:'smooth' });
}

// ── Bu gün ───────────────────────────────────────────────────────
function loadTodayLogs() {
  var el = document.getElementById('todayLogs');
  el.innerHTML = '<div class="empty"><i class="fa-solid fa-circle-notch fa-spin"></i><p>Yüklənir...</p></div>';

  google.script.run
    .withSuccessHandler(function(res) { renderTodayLogs(res); })
    .withFailureHandler(function() {
      document.getElementById('todayLogs').innerHTML =
        '<div class="empty"><i class="fa-solid fa-triangle-exclamation"></i><p>Yüklənə bilmədi.</p></div>';
    })
    .getTodayTrainerLogs(TRAINER_KEY);
}

function renderTodayLogs(res) {
  var el = document.getElementById('todayLogs');
  var logs = (res && res.logs) ? res.logs : [];
  if (!logs.length) {
    el.innerHTML = '<div class="empty"><i class="fa-solid fa-clipboard"></i><p>Bu gün hələ təlim qeyd edilməyib.</p></div>';
    return;
  }
  el.innerHTML = logs.map(function(log, idx) {
    return buildLogCard(log, 'tl-' + idx);
  }).join('');
}

function buildLogCard(log, uid) {
  var items = log.items || [];
  var done  = items.filter(function(i){ return i.checked; }).length;
  var total = items.length;
  var pct   = total ? Math.round(done/total*100) : 0;
  var clr   = pct>=80 ? 'var(--success)' : pct>=50 ? 'var(--warning)' : 'var(--danger)';
  var time  = log.created_at
    ? new Date(log.created_at).toLocaleTimeString('az-AZ',{hour:'2-digit',minute:'2-digit'})
    : '';

  // Detallı element siyahısı
  var itemRows = items.map(function(item) {
    var ok = item.checked;
    return '<div style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid rgba(15,23,42,0.04);">' +
      '<div style="width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;' +
        (ok ? 'background:rgba(16,185,129,0.12);' : 'background:rgba(239,68,68,0.07);') + '">' +
        '<i class="fa-solid ' + (ok?'fa-check':'fa-xmark') + '" style="font-size:0.6rem;color:' + (ok?'#10b981':'#ef4444') + ';"></i>' +
      '</div>' +
      '<div style="flex:1;">' +
        '<div style="font-size:0.83rem;font-weight:600;color:' + (ok?'var(--text-main)':'var(--danger)') + ';">' + item.text + '</div>' +
        (item.note ? '<div style="font-size:0.76rem;color:#92400e;background:rgba(245,158,11,0.07);border-radius:6px;padding:3px 7px;margin-top:3px;">' +
          '<i class="fa-solid fa-comment-dots" style="margin-right:4px;"></i>' + item.note + '</div>' : '') +
      '</div>' +
      '<span style="font-size:0.68rem;color:var(--text-soft);white-space:nowrap;padding-top:2px;">' + (item.category||'') + '</span>' +
    '</div>';
  }).join('');

  return '<div class="log-card" style="cursor:default;">' +
    // Klik edilən başlıq
    '<div onclick="trToggle(\'' + uid + '\')" style="cursor:pointer;">' +
      '<div class="log-head">' +
        '<div class="log-emp">' + (log.emp_name||'—') + '</div>' +
        '<span class="log-dept">' + log.dept + '</span>' +
        '<span class="log-time">' + time + '</span>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:10px;">' +
        '<div style="flex:1;height:5px;background:rgba(15,23,42,0.07);border-radius:100px;overflow:hidden;">' +
          '<div style="height:100%;width:' + pct + '%;background:' + clr + ';border-radius:100px;"></div>' +
        '</div>' +
        '<span class="log-score" style="color:' + clr + ';white-space:nowrap;">' +
          '<i class="fa-solid fa-check-double"></i> ' + done + '/' + total + ' (' + pct + '%)' +
        '</span>' +
        '<i class="fa-solid fa-chevron-down" id="ico-' + uid + '" style="font-size:0.75rem;color:var(--text-soft);transition:transform 0.25s;flex-shrink:0;"></i>' +
      '</div>' +
    '</div>' +
    // Açılan hissə
    '<div id="det-' + uid + '" style="overflow:hidden;max-height:0;transition:max-height 0.35s ease;">' +
      '<div style="padding-top:10px;border-top:1px solid rgba(15,23,42,0.05);margin-top:10px;">' +
        itemRows +
        (log.general_note ? '<div class="log-note" style="margin-top:8px;"><i class="fa-solid fa-note-sticky"></i> <b>Ümumi qeyd:</b> ' + log.general_note + '</div>' : '') +
      '</div>' +
    '</div>' +
  '</div>';
}

function trToggle(uid) {
  var det = document.getElementById('det-' + uid);
  var ico = document.getElementById('ico-' + uid);
  if (!det) return;
  var open = det.style.maxHeight !== '0px' && det.style.maxHeight !== '';
  det.style.maxHeight = open ? '0px' : det.scrollHeight + 200 + 'px';
  if (ico) ico.style.transform = open ? '' : 'rotate(180deg)';
}
</script>
