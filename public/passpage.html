<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Coffeemoon - Giriş Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{--bg:#f8fafc;--card-bg:rgba(255,255,255,0.75);--primary:#6366f1;--primary-light:rgba(99,102,241,0.08);--success:#10b981;--success-light:rgba(16,185,129,0.08);--danger:#ef4444;--danger-light:rgba(239,68,68,0.08);--warning:#f59e0b;--warning-light:rgba(245,158,11,0.08);--text-main:#0f172a;--text-muted:#64748b;--border:rgba(255,255,255,0.6);--card-shadow:0 30px 60px -15px rgba(15,23,42,0.08),0 0 0 1px rgba(15,23,42,0.04);}
  *{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  body{background:var(--bg);color:var(--text-main);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;overflow:hidden;position:relative;}
  .glow-1{position:fixed;top:-15%;left:-10%;width:60vw;height:60vw;background:#e0e7ff;border-radius:50%;filter:blur(120px);opacity:0.7;z-index:0;}
  .glow-2{position:fixed;bottom:-15%;right:-10%;width:60vw;height:60vw;background:#fae8ff;border-radius:50%;filter:blur(120px);opacity:0.6;z-index:0;}
  .terminal{background:var(--card-bg);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid var(--border);padding:3rem 2.5rem;border-radius:36px;box-shadow:var(--card-shadow);width:100%;max-width:400px;text-align:center;position:relative;z-index:1;}
  .brand-logo{font-size:1.15rem;font-weight:800;color:var(--text-main);letter-spacing:4px;margin-bottom:2.5rem;display:flex;justify-content:center;align-items:center;gap:10px;text-transform:uppercase;}
  .brand-logo i{color:#854d0e;}
  .display-box{margin-bottom:2.5rem;}
  .pin-display{font-size:3.5rem;letter-spacing:16px;font-weight:700;color:var(--text-main);height:60px;display:flex;justify-content:center;align-items:center;margin-left:16px;}
  .status-text{font-size:0.85rem;color:var(--text-muted);min-height:20px;margin-top:15px;font-weight:500;letter-spacing:0.5px;transition:0.3s ease;}
  .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
  .num-btn{background:#fff;border:1px solid rgba(15,23,42,0.05);color:var(--text-main);font-size:1.7rem;font-weight:600;height:80px;border-radius:24px;cursor:pointer;transition:all 0.2s cubic-bezier(0.16,1,0.3,1);user-select:none;box-shadow:0 4px 10px rgba(15,23,42,0.02);}
  .num-btn:active{transform:scale(0.94);}
  .num-btn.action{font-size:1.3rem;}
  .num-btn.clear{color:var(--text-muted);}
  .num-btn.clear:active{color:var(--danger);background:var(--danger-light);}
  .num-btn.ok{background:var(--primary);color:#fff;font-weight:600;border:none;box-shadow:0 8px 20px rgba(99,102,241,0.2);}
  .num-btn.ok:active{background:#4f46e5;}
  /* Device screens */
  .loader-screen{text-align:center;padding:2rem 0;}
  .loader-screen i{color:var(--primary);}
  .loader-screen p{margin-top:1rem;color:var(--text-muted);font-size:0.9rem;font-weight:500;}
  .pending-screen{display:none;}
  .status-icon{width:72px;height:72px;border-radius:22px;display:inline-flex;align-items:center;justify-content:center;font-size:1.8rem;margin-bottom:1.5rem;}
  .status-icon.warning{background:var(--warning-light);color:var(--warning);border:1px solid rgba(245,158,11,0.15);}
  .status-icon.danger{background:var(--danger-light);color:var(--danger);border:1px solid rgba(239,68,68,0.15);}
  .status-title{font-size:1.25rem;font-weight:700;margin-bottom:0.75rem;letter-spacing:-0.3px;}
  .status-desc{font-size:0.87rem;color:var(--text-muted);line-height:1.6;font-weight:500;}
  .device-id-box{margin-top:1.5rem;background:rgba(15,23,42,0.03);border:1px solid rgba(15,23,42,0.06);border-radius:14px;padding:1rem 1.2rem;text-align:left;}
  .device-id-lbl{font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:6px;}
  .device-id-val{font-family:monospace;font-size:0.9rem;font-weight:600;color:var(--text-main);word-break:break-all;}
  .btn-check{margin-top:1.5rem;width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:16px;font-size:0.95rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 20px rgba(99,102,241,0.2);transition:all 0.2s;}
  .btn-check:hover{background:#4f46e5;}
  .pin-pad{display:none;}
  /* Result overlay */
  .result-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.92);backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:all 0.4s cubic-bezier(0.16,1,0.3,1);z-index:50;}
  .result-overlay.show{opacity:1;pointer-events:all;}
  .res-icon{font-size:2.2rem;margin-bottom:1.5rem;animation:pop 0.5s cubic-bezier(0.34,1.56,0.64,1);width:80px;height:80px;border-radius:26px;display:inline-flex;align-items:center;justify-content:center;}
  .res-title{font-size:1.6rem;font-weight:700;margin-bottom:0.8rem;letter-spacing:-0.3px;color:var(--text-main);}
  .res-subtitle{font-size:1rem;color:var(--text-muted);text-align:center;line-height:1.5;background:#fff;padding:22px 35px;border-radius:22px;font-weight:500;border:1px solid rgba(15,23,42,0.05);}
  .success-theme{background:var(--success-light);color:var(--success);border:1px solid rgba(16,185,129,0.15);}
  .error-theme{background:var(--danger-light);color:var(--danger);border:1px solid rgba(239,68,68,0.15);}
  @keyframes pop{0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}
  .mode-toggle{display:flex;gap:8px;margin-bottom:18px;}
  .mode-btn{flex:1;padding:11px 6px;border:1.5px solid rgba(15,23,42,0.1);border-radius:14px;font-size:0.82rem;font-weight:700;cursor:pointer;background:transparent;color:var(--text-muted);font-family:'Inter',sans-serif;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;}
  .mode-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 4px 14px rgba(99,102,241,0.25);}
  .qr-scan-area{display:none;flex-direction:column;align-items:center;gap:10px;}
  .qr-scan-area.show{display:flex;}
  #qr-reader{width:270px;height:270px;border-radius:18px;overflow:hidden;background:#111;}
  #qr-reader video{width:100%!important;height:100%!important;object-fit:cover;}
  #qr-reader canvas{border-radius:18px;}
  .qr-hint{font-size:0.8rem;color:var(--text-muted);font-weight:600;text-align:center;}
</style>
</head>
<body>
<div class="glow-1"></div><div class="glow-2"></div>
<div class="terminal">
  <div class="brand-logo"><i class="fa-solid fa-mug-hot"></i> COFFEEMOON</div>
  <div class="loader-screen" id="loaderScreen">
    <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i>
    <p>Cihaz yoxlanılır...</p>
  </div>
  <div class="pending-screen" id="pendingScreen">
    <div class="status-icon warning" id="statusIcon"><i class="fa-solid fa-hourglass-half"></i></div>
    <div class="status-title" id="statusTitle">Admin Təsdiqi Gözlənilir</div>
    <div class="status-desc" id="statusDesc">Bu cihaz admin tərəfindən hələ təsdiqlənməyib.</div>
    <div class="device-id-box"><div class="device-id-lbl"><i class="fa-solid fa-microchip"></i> Cihaz ID</div><div class="device-id-val" id="deviceIdVal">—</div></div>
    <button class="btn-check" onclick="checkDevice()"><i class="fa-solid fa-rotate"></i> Yenidən Yoxla</button>
  </div>
  <div class="pin-pad" id="pinPad">
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnPinMode" onclick="setScanMode('pin')"><i class="fa-solid fa-keyboard"></i> PIN</button>
      <button class="mode-btn" id="btnQrMode" onclick="setScanMode('qr')"><i class="fa-solid fa-qrcode"></i> Kamera</button>
    </div>
    <div class="qr-scan-area" id="qrScanArea">
      <div id="qr-reader"></div>
      <div class="qr-hint" id="qrHint"><i class="fa-solid fa-camera"></i> Kameranı QR koda yönəldin</div>
    </div>
    <div id="pinDisplayBox">
      <div class="pin-display" id="pinDisplay">_ _ _ _</div>
      <div class="status-text" id="statusText">Smen giriş və ya çıxış kodunuzu daxil edin</div>
    </div>
    <div class="numpad" id="numpadGrid">
      <button class="num-btn" onclick="press('1')">1</button>
      <button class="num-btn" onclick="press('2')">2</button>
      <button class="num-btn" onclick="press('3')">3</button>
      <button class="num-btn" onclick="press('4')">4</button>
      <button class="num-btn" onclick="press('5')">5</button>
      <button class="num-btn" onclick="press('6')">6</button>
      <button class="num-btn" onclick="press('7')">7</button>
      <button class="num-btn" onclick="press('8')">8</button>
      <button class="num-btn" onclick="press('9')">9</button>
      <button class="num-btn action clear" onclick="clearPin()"><i class="fa-solid fa-delete-left"></i></button>
      <button class="num-btn" onclick="press('0')">0</button>
      <button class="num-btn action ok" onclick="submitPin()"><i class="fa-solid fa-check"></i></button>
    </div>
  </div>
</div>
<div class="result-overlay" id="resOverlay">
  <div class="res-icon" id="resIcon"></div>
  <div class="res-title" id="resTitle"></div>
  <div class="res-subtitle" id="resSub"></div>
</div>
<!-- Warning Overlay -->
<div class="result-overlay" id="warnOverlay" style="background:rgba(255,255,255,0.95);">
  <div class="res-icon" id="warnIcon"></div>
  <div class="res-title" id="warnTitle"></div>
  <div class="res-subtitle" id="warnSub"></div>
  <div style="margin-top:1.2rem;width:100%;max-width:320px;" id="warnBtns"></div>
</div>
<script src="/gsr-shim.js"></script>
<script>
var myDeviceId=localStorage.getItem('scan_device_id_v1');
if(!myDeviceId){myDeviceId='SCN-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).substring(2,6).toUpperCase();localStorage.setItem('scan_device_id_v1',myDeviceId);}
document.getElementById('deviceIdVal').innerText=myDeviceId;

function checkDevice(){
  document.getElementById('loaderScreen').style.display='block';
  document.getElementById('pendingScreen').style.display='none';
  document.getElementById('pinPad').style.display='none';
  google.script.run
    .withSuccessHandler(function(res){
      document.getElementById('loaderScreen').style.display='none';
      if(res&&res.allowed){document.getElementById('pinPad').style.display='block';}
      else{
        var ip=res&&res.pending;
        var icon=document.getElementById('statusIcon');
        icon.className='status-icon '+(ip?'warning':'danger');
        icon.innerHTML=ip?"<i class='fa-solid fa-hourglass-half'></i>":"<i class='fa-solid fa-ban'></i>";
        document.getElementById('statusTitle').innerText=ip?'Admin Təsdiqi Gözlənilir':'Giriş Qadağandır';
        document.getElementById('statusDesc').innerText=res?res.reason:'Bu cihaza giriş icazəsi verilməyib.';
        document.getElementById('pendingScreen').style.display='block';
      }
    })
    .withFailureHandler(function(){
      document.getElementById('loaderScreen').style.display='none';
      document.getElementById('statusIcon').className='status-icon danger';
      document.getElementById('statusIcon').innerHTML="<i class='fa-solid fa-triangle-exclamation'></i>";
      document.getElementById('statusTitle').innerText='Sistem Xətası';
      document.getElementById('statusDesc').innerText='Serverə qoşulmaq mümkün olmadı.';
      document.getElementById('pendingScreen').style.display='block';
    })
    .checkScanDevice(myDeviceId);
}
checkDevice();
setInterval(function(){if(document.getElementById('pendingScreen').style.display==='block')checkDevice();},30000);

var currentPin='', isProcessing=false, _pendingIp='';
var statusEl=document.getElementById('statusText');

function press(num){if(isProcessing||currentPin.length>=4)return;currentPin+=num;updateDisplay();if(currentPin.length===4){statusEl.innerHTML="Təsdiqləmək üçün <i class='fa-solid fa-check'></i> basın";statusEl.style.color="var(--text-main)";}}
function clearPin(){if(isProcessing)return;currentPin='';updateDisplay();statusEl.innerHTML="Smen giriş və ya çıxış kodunuzu daxil edin";statusEl.style.color="var(--text-muted)";}
function updateDisplay(){document.getElementById('pinDisplay').innerText=currentPin.padEnd(4,'_').split('').join(' ');}

// ── IP alındıqdan sonra server çağırışı ─────────────────────────
function submitPin(){
  if(currentPin.length!==4||isProcessing)return;
  isProcessing=true;
  statusEl.innerHTML="<i class='fa-solid fa-circle-notch fa-spin'></i> Şəbəkə yoxlanılır...";
  statusEl.style.color="var(--primary)";
  var ipTimeout=setTimeout(function(){doValidate('',false);},3000);
  fetch('https://api.ipify.org?format=json')
    .then(function(r){return r.json();})
    .then(function(d){clearTimeout(ipTimeout);doValidate(d.ip||'',false);})
    .catch(function(){clearTimeout(ipTimeout);doValidate('',false);});
}

// ── Servərə göndər (forceMode: warning keçdikdən sonra true olur) ─
function doValidate(clientIp, forceMode){
  _pendingIp=clientIp;
  google.script.run
    .withSuccessHandler(function(res){handleValidateResult(res);})
    .withFailureHandler(function(){showError("Sistem xətası.");})
    .validateAndLog(currentPin, clientIp, forceMode||false);
}

// ── Cavabı idarə et ──────────────────────────────────────────────
function handleValidateResult(res){
  if(!res.valid && res.warningType){
    isProcessing=false;
    showWarning(res);
    return;
  }
  showResult(res);
}

// ── Uğurlu / uğursuz nəticə (mövcud kod, dəyişməyib) ────────────
function showResult(res){
  if(!res.valid){showError(res.reason);return;}
  var isG=res.type!=='CIXIS';
  document.getElementById('resIcon').innerHTML=isG?"<i class='fa-solid fa-right-to-bracket'></i>":"<i class='fa-solid fa-right-from-bracket'></i>";
  document.getElementById('resIcon').className='res-icon success-theme';
  document.getElementById('resTitle').innerText=isG?'Giriş Qeydə Alındı':'Çıxış Qeydə Alındı';
  var otText='';
  if(!isG&&res.overtime){var otColor=res.overtime.startsWith('+')?'var(--success)':(res.overtime.startsWith('-')?'var(--danger)':'var(--text-muted)');otText='<div style="margin-top:15px;font-size:0.9rem;padding-top:15px;border-top:1px solid rgba(15,23,42,0.05);font-weight:600;">İş saatı fərqi: <b style="color:'+otColor+'">'+res.overtime+'</b></div>';}
  document.getElementById('resSub').innerHTML='<b style="font-size:1.3rem;color:var(--text-main);font-weight:700;">'+res.empName+'</b><br><span style="color:var(--text-muted);font-size:0.88rem;font-weight:500;"><i class="fa-solid fa-briefcase"></i> '+res.dept+'</span>'+otText;
  document.getElementById('resOverlay').classList.add('show');
  setTimeout(resetAll,3000);
}

function showError(msg){
  document.getElementById('resIcon').innerHTML="<i class='fa-solid fa-shield-halved'></i>";
  document.getElementById('resIcon').className='res-icon error-theme';
  document.getElementById('resTitle').innerText='Rədd Edildi';
  document.getElementById('resSub').innerHTML='<span style="font-weight:600;color:#991b1b;">'+msg+'</span>';
  document.getElementById('resOverlay').classList.add('show');
  setTimeout(resetAll,3500);
}

function resetAll(){
  isProcessing=false;currentPin='';updateDisplay();
  document.getElementById('resOverlay').classList.remove('show');
  document.getElementById('warnOverlay').classList.remove('show');
  statusEl.innerHTML="Smen giriş və ya çıxış kodunuzu daxil edin";
  statusEl.style.color="var(--text-muted)";
  if(_scanMode==='qr'){startQrScanner();}
}

// ══════════════════════════════════════════════════════════════════
//  WARNING SİSTEMİ
// ══════════════════════════════════════════════════════════════════

var BTN_DISMISS =
  '<button onclick="dismissWarning()" '+
  'style="width:100%;padding:14px;border:none;background:var(--primary);color:#fff;'+
  'border-radius:14px;font-size:0.95rem;font-weight:700;cursor:pointer;'+
  'font-family:\'Inter\',sans-serif;box-shadow:0 6px 14px rgba(99,102,241,0.25);">'+
  'Anladım</button>';

function showWarning(res){
  var wIcon  = document.getElementById('warnIcon');
  var wTitle = document.getElementById('warnTitle');
  var wSub   = document.getElementById('warnSub');
  var wBtns  = document.getElementById('warnBtns');

  if(res.warningType==='UNCLOSED_LUNCH'){
    wIcon.innerHTML  = "<i class='fa-solid fa-bowl-food'></i>";
    wIcon.style.cssText = 'background:rgba(245,158,11,0.1);color:#f59e0b;border:1px solid rgba(245,158,11,0.25);';
    wTitle.innerText = 'Xəbərdarlıq!';
    wSub.innerHTML   =
      '<b style="font-size:1.05rem;color:var(--text-main);">'+res.empName+'</b><br>'+
      '<span style="color:var(--text-muted);font-size:0.88rem;line-height:1.65;">'+
      'Nahar müddəti hələ davam edir.<br>Əvvəlcə nahardan çıxış edilməlidir.</span>';
    wBtns.innerHTML = BTN_DISMISS;

  } else {
    // UNCLOSED_WARNING və ya UNCLOSED_PENALTY — hər ikisi bloklanır
    wIcon.innerHTML  = "<i class='fa-solid fa-triangle-exclamation'></i>";
    wIcon.style.cssText = 'background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.25);';
    wTitle.innerText = 'Xəbərdarlıq!';
    wSub.innerHTML   =
      '<b style="font-size:1.05rem;color:var(--text-main);">'+res.empName+'</b><br>'+
      '<span style="color:var(--text-muted);font-size:0.88rem;line-height:1.65;">'+
      'Əvvəlki smendən çıxış edilməyib.<br>Zəhmət olmasa idarəçiyə müraciət edin.</span>';
    wBtns.innerHTML = BTN_DISMISS;
  }

  document.getElementById('warnOverlay').classList.add('show');
}

function dismissWarning(){
  document.getElementById('warnOverlay').classList.remove('show');
  resetAll();
}

// ══════════════════════════════════════════════════════════════════
//  QR KAMERA SİSTEMİ
// ══════════════════════════════════════════════════════════════════
var _html5Qr = null, _scanMode = 'pin';

function setScanMode(mode) {
  _scanMode = mode;
  document.getElementById('btnPinMode').classList.toggle('active', mode === 'pin');
  document.getElementById('btnQrMode').classList.toggle('active', mode === 'qr');
  document.getElementById('qrScanArea').classList.toggle('show', mode === 'qr');
  document.getElementById('pinDisplayBox').style.display = mode === 'pin' ? '' : 'none';
  document.getElementById('numpadGrid').style.display = mode === 'pin' ? 'grid' : 'none';
  if (mode === 'qr') { startQrScanner(); } else { stopQrScanner(); }
}

function startQrScanner() {
  if (_html5Qr) { _html5Qr.stop().catch(function(){}); _html5Qr = null; }
  document.getElementById('qrHint').innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Kamera açılır...';
  _html5Qr = new Html5Qrcode('qr-reader');
  _html5Qr.start(
    { facingMode: 'environment' },
    { fps: 12, qrbox: { width: 220, height: 220 } },
    function(decoded) {
      if (isProcessing) return;
      var pin = decoded.trim();
      if (!/^\d{4}$/.test(pin)) {
        document.getElementById('qrHint').innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Yanlış QR kod';
        setTimeout(function(){ document.getElementById('qrHint').innerHTML = '<i class="fa-solid fa-camera"></i> Kameranı QR koda yönəldin'; }, 1500);
        return;
      }
      stopQrScanner();
      currentPin = pin;
      updateDisplay();
      submitPin();
    },
    function() {}
  ).then(function() {
    document.getElementById('qrHint').innerHTML = '<i class="fa-solid fa-camera"></i> Kameranı QR koda yönəldin';
  }).catch(function(err) {
    document.getElementById('qrHint').innerHTML = '<i class="fa-solid fa-ban"></i> Kamera açıla bilmədi';
  });
}

function stopQrScanner() {
  if (_html5Qr) { _html5Qr.stop().catch(function(){}); _html5Qr = null; }
}
</script>
</body>
</html>
