<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çeklist — <?= dept ?></title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg:#f8fafc;--surface:rgba(255,255,255,0.8);--border:rgba(255,255,255,0.6);--primary:#6366f1;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--text-main:#0f172a;--text-muted:#64748b;--card-shadow:0 20px 40px -15px rgba(15,23,42,0.08),0 0 0 1px rgba(15,23,42,0.04);}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;touch-action:manipulation;}
body{background:var(--bg);color:var(--text-main);min-height:100vh;padding:1.5rem;}
.glow-1{position:fixed;top:-10%;left:-10%;width:55vw;height:55vw;background:#e0e7ff;border-radius:50%;filter:blur(100px);opacity:0.6;z-index:0;}
.glow-2{position:fixed;bottom:-10%;right:-10%;width:55vw;height:55vw;background:#fae8ff;border-radius:50%;filter:blur(100px);opacity:0.5;z-index:0;}
.wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;}

header{background:var(--surface);backdrop-filter:blur(30px);border:1px solid var(--border);border-radius:20px;padding:1.2rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:1rem;box-shadow:var(--card-shadow);}
.logo{font-size:1rem;font-weight:800;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:3px;}
.logo i{color:#854d0e;}
.dept-badge{background:rgba(99,102,241,0.08);color:var(--primary);border:1px solid rgba(99,102,241,0.15);padding:6px 14px;border-radius:100px;font-size:0.85rem;font-weight:700;display:flex;align-items:center;gap:6px;}

.cl-progress-card{background:var(--surface);backdrop-filter:blur(30px);border:1px solid var(--border);border-radius:20px;padding:1.2rem 1.4rem;margin-bottom:1.1rem;box-shadow:var(--card-shadow);}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;}
.prog-label{font-size:0.83rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
.prog-count{font-size:1.6rem;font-weight:800;color:var(--text-main);}
.prog-count span{font-size:0.9rem;font-weight:500;color:var(--text-muted);}
.prog-bar-wrap{height:8px;background:rgba(15,23,42,0.06);border-radius:100px;overflow:hidden;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--success));border-radius:100px;transition:width 0.5s cubic-bezier(0.16,1,0.3,1);}

.cat-section{margin-bottom:0.7rem;}
.cat-title{font-size:0.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;padding:0 0.2rem;margin-bottom:0.5rem;display:flex;align-items:center;gap:6px;}
.cat-title::before{content:'';display:inline-block;width:3px;height:12px;background:var(--primary);border-radius:2px;}

.item-card{background:var(--surface);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;margin-bottom:0.55rem;overflow:hidden;box-shadow:0 4px 12px rgba(15,23,42,0.03);transition:all 0.25s cubic-bezier(0.16,1,0.3,1);position:relative;}
.item-card.checked{border-color:rgba(16,185,129,0.25);background:rgba(16,185,129,0.04);}
.item-main{display:flex;align-items:center;gap:12px;padding:1rem 1.1rem;cursor:pointer;user-select:none;}
.check-circle{width:26px;height:26px;border-radius:50%;border:2px solid rgba(15,23,42,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.25s cubic-bezier(0.16,1,0.3,1);background:#fff;}
.check-circle i{font-size:0.7rem;color:#fff;opacity:0;transition:opacity 0.2s;}
.item-card.checked .check-circle{background:var(--success);border-color:var(--success);}
.item-card.checked .check-circle i{opacity:1;}
.item-text{flex:1;font-size:0.92rem;font-weight:600;color:var(--text-main);transition:color 0.2s;}
.item-card.checked .item-text{color:var(--text-muted);text-decoration:line-through;}
.item-time{font-size:0.75rem;color:var(--success);font-weight:700;flex-shrink:0;display:none;}
.item-card.checked .item-time{display:block;}

.note-toggle{padding:0 1.1rem;padding-bottom:0;overflow:hidden;max-height:0;transition:max-height 0.3s ease,padding 0.3s ease;}
.note-toggle.open{max-height:120px;padding-bottom:0.9rem;}
.note-input{width:100%;border:1px solid rgba(15,23,42,0.08);border-radius:11px;padding:0.65rem 0.9rem;font-size:0.85rem;font-weight:500;color:var(--text-main);resize:none;outline:none;background:#fff;font-family:'Inter',sans-serif;transition:border-color 0.2s;}
.note-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,0.07);}
.note-input::placeholder{color:#94a3b8;}
.note-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.note-lbl{font-size:0.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
.note-expand{font-size:0.78rem;color:var(--primary);cursor:pointer;font-weight:600;display:flex;align-items:center;gap:4px;margin-left:auto;}
.admin-note-box{margin:0 1.1rem 0.75rem;background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.2);border-radius:11px;padding:0.7rem 0.9rem;font-size:0.82rem;color:#92400e;font-weight:500;display:none;align-items:flex-start;gap:7px;}
.admin-note-box.show{display:flex;}
.admin-note-box i{font-size:0.85rem;flex-shrink:0;margin-top:1px;}

.cl-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:1rem;}
.cl-loader i{font-size:2rem;color:var(--primary);}
.cl-loader p{color:var(--text-muted);font-size:0.9rem;font-weight:500;}

#clToast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0f172a;color:#fff;padding:11px 20px;border-radius:14px;font-size:0.86rem;font-weight:600;z-index:200;opacity:0;transition:all 0.35s cubic-bezier(0.16,1,0.3,1);white-space:nowrap;box-shadow:0 8px 24px rgba(15,23,42,0.2);}
#clToast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="glow-1"></div><div class="glow-2"></div>
<div class="wrap">

<header>
  <div class="logo"><i class="fa-solid fa-mug-hot"></i> Coffeemoon</div>
  <div class="dept-badge" id="deptBadge"><i class="fa-solid fa-clipboard-check"></i> <?= dept ?> — Çeklist</div>
</header>

<div id="clLoader" class="cl-loader">
  <i class="fa-solid fa-circle-notch fa-spin"></i>
  <p>Çeklist yüklənir...</p>
</div>

<div id="clContent" style="display:none;">
  <div class="cl-progress-card">
    <div class="prog-header">
      <div class="prog-label"><i class="fa-solid fa-chart-simple"></i> Günlük irəliləyiş</div>
      <div class="prog-count"><span id="checkedCount">0</span> <span>/ <span id="totalCount">0</span></span></div>
    </div>
    <div class="prog-bar-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
  </div>
  <div id="clItemsWrap"></div>
</div>

</div><!-- /wrap -->
<div id="clToast"></div>

<script src="/gsr-shim.js"></script>
<script>
var BRANCH_KEY = '<?= branchKey ?>';

var clItemsData = [];

function loadChecklist() {
  document.getElementById('clLoader').style.display = 'flex';
  document.getElementById('clContent').style.display = 'none';
  google.script.run
    .withSuccessHandler(function(res) {
      document.getElementById('clLoader').style.display = 'none';
      if (!res || !res.valid) {
        document.getElementById('clLoader').innerHTML =
          '<i class="fa-solid fa-triangle-exclamation" style="color:#ef4444"></i>' +
          '<p style="color:#ef4444;font-weight:700">Xəta: ' + (res && res.reason || 'Giriş rədd edildi') + '</p>';
        document.getElementById('clLoader').style.display = 'flex';
        return;
      }
      clItemsData = res.items || [];
      renderClItems();
      document.getElementById('clContent').style.display = 'block';
    })
    .withFailureHandler(function() {
      document.getElementById('clLoader').innerHTML =
        '<i class="fa-solid fa-triangle-exclamation" style="color:#ef4444"></i>' +
        '<p style="color:#ef4444;font-weight:600">Yüklənmə xətası</p>';
      document.getElementById('clLoader').style.display = 'flex';
    })
    .getChecklistForBranch(BRANCH_KEY);
}

function renderClItems() {
  var cats = {};
  clItemsData.forEach(function(item) {
    if (!cats[item.category]) cats[item.category] = [];
    cats[item.category].push(item);
  });
  var html = '';
  Object.keys(cats).forEach(function(cat) {
    html += '<div class="cat-section"><div class="cat-title">' + escHtml(cat) + '</div>';
    cats[cat].forEach(function(item){ html += buildClItemHtml(item); });
    html += '</div>';
  });
  document.getElementById('clItemsWrap').innerHTML = html;
  updateClProgress();
  clItemsData.forEach(function(item) {
    var noteArea = document.getElementById('clnote-' + item.itemId);
    if (noteArea) {
      noteArea.addEventListener('blur', function(){ saveClNote(item.itemId, noteArea.value); });
    }
  });
}

function buildClItemHtml(item) {
  var checked   = item.checked;
  var adminNote = item.adminNote || '';
  var h = '<div class="item-card' + (checked?' checked':'') + '" id="clcard-' + item.itemId + '">';
  h += '<div class="item-main" onclick="toggleClItem(\'' + item.itemId + '\')">';
  h += '<div class="check-circle"><i class="fa-solid fa-check"></i></div>';
  h += '<div class="item-text">' + escHtml(item.text) + '</div>';
  h += '<div class="item-time" id="cltime-' + item.itemId + '">' + (item.checkedAt||'') + '</div>';
  h += '</div>';
  if (adminNote) {
    h += '<div class="admin-note-box show"><i class="fa-solid fa-user-tie"></i><span>' + escHtml(adminNote) + '</span></div>';
  }
  h += '<div class="note-row" style="padding:0 1.1rem;margin-bottom:4px;">';
  h += '<span class="note-lbl"><i class="fa-regular fa-note-sticky"></i> Qeyd</span>';
  h += '<span class="note-expand" onclick="toggleClNote(\'' + item.itemId + '\')"><i class="fa-solid fa-chevron-' + (item.mgrNote?'up':'down') + '" id="clchevron-' + item.itemId + '"></i></span>';
  h += '</div>';
  h += '<div class="note-toggle' + (item.mgrNote?' open':'') + '" id="clnotewrap-' + item.itemId + '">';
  h += '<textarea class="note-input" id="clnote-' + item.itemId + '" rows="2" placeholder="Buraya qeyd yazın...">' + escHtml(item.mgrNote||'') + '</textarea>';
  h += '</div>';
  h += '</div>';
  return h;
}

function toggleClItem(itemId) {
  var card = document.getElementById('clcard-' + itemId);
  if (!card || card.classList.contains('loading')) return;
  var item = clItemsData.find(function(i){ return i.itemId === itemId; });
  if (!item) return;
  var newChecked = !item.checked;
  card.classList.add('loading');
  card.style.opacity = '0.7';
  var noteEl = document.getElementById('clnote-' + itemId);
  var note   = noteEl ? noteEl.value : '';
  google.script.run
    .withSuccessHandler(function(res) {
      card.classList.remove('loading');
      card.style.opacity = '';
      if (!res || !res.valid) { showClToast('Xəta baş verdi!', true); return; }
      item.checked   = newChecked;
      item.checkedAt = res.checkedAt || '';
      item.mgrNote   = note;
      if (newChecked) {
        card.classList.add('checked');
        var t = document.getElementById('cltime-' + itemId);
        if (t) t.textContent = item.checkedAt;
        showClToast('✓ Qeyd edildi — ' + item.checkedAt);
      } else {
        card.classList.remove('checked');
        showClToast('Qeyd ləğv edildi');
      }
      updateClProgress();
    })
    .withFailureHandler(function() {
      card.classList.remove('loading');
      card.style.opacity = '';
      showClToast('Serverə qoşulmaq alınmadı!', true);
    })
    .submitChecklistItem(BRANCH_KEY, itemId, newChecked, note);
}

function saveClNote(itemId, val) {
  var item = clItemsData.find(function(i){ return i.itemId === itemId; });
  if (!item || item.mgrNote === val) return;
  item.mgrNote = val;
  google.script.run
    .withSuccessHandler(function(){})
    .withFailureHandler(function(){})
    .submitChecklistItem(BRANCH_KEY, itemId, item.checked, val);
}

function toggleClNote(itemId) {
  var wrap = document.getElementById('clnotewrap-' + itemId);
  var icon = document.getElementById('clchevron-' + itemId);
  if (!wrap) return;
  var isOpen = wrap.classList.contains('open');
  wrap.classList.toggle('open');
  if (icon) icon.className = 'fa-solid fa-chevron-' + (isOpen ? 'down' : 'up');
  if (!isOpen) setTimeout(function(){ var ta=document.getElementById('clnote-'+itemId); if(ta)ta.focus(); }, 310);
}

function updateClProgress() {
  var total   = clItemsData.length;
  var checked = clItemsData.filter(function(i){ return i.checked; }).length;
  document.getElementById('checkedCount').textContent = checked;
  document.getElementById('totalCount').textContent   = total;
  document.getElementById('progBar').style.width = (total ? Math.round(checked/total*100) : 0) + '%';
}

function showClToast(msg, isErr) {
  var t = document.getElementById('clToast');
  t.textContent = msg;
  t.style.background = isErr ? '#ef4444' : '#0f172a';
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadChecklist();
</script>
<footer style="text-align:center;padding:18px 0 14px;font-family:Inter,sans-serif;"><div style="font-size:0.72rem;font-weight:600;color:rgba(15,23,42,0.3);letter-spacing:0.01em;">created by Coffeemoon</div><div style="font-size:0.65rem;color:rgba(15,23,42,0.2);margin-top:2px;">version 1.0.1</div></footer>
</body>
</html>
