<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Coffeemoon · İcraçı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --primary:#0d9488;--purple:#7c3aed;--success:#10b981;--danger:#ef4444;--amber:#f59e0b;
  --text-main:#0f172a;--text-muted:#64748b;--text-soft:#94a3b8;--border:rgba(15,23,42,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:#f1f5f9;color:var(--text-main);font-size:15px;-webkit-tap-highlight-color:transparent;}
.wrap{max-width:760px;margin:0 auto;padding:0 12px 60px;}
.topbar{position:sticky;top:0;z-index:50;background:rgba(241,245,249,0.92);backdrop-filter:blur(12px);padding:0.9rem 12px 0.6rem;margin:0 -12px;}
.topbar-row{display:flex;align-items:center;gap:10px;margin-bottom:0.7rem;}
.brand{font-size:1.05rem;font-weight:900;display:flex;align-items:center;gap:8px;}
.brand i{color:var(--primary);}
.brand .who{font-size:0.72rem;font-weight:700;color:var(--text-muted);background:#fff;padding:3px 9px;border-radius:100px;border:1px solid var(--border);margin-left:auto;}
.tabbar{display:flex;flex-wrap:wrap;gap:5px;}
.tab-btn{flex:1 1 auto;min-width:84px;padding:0.5rem 0.4rem;border:1.5px solid var(--border);border-radius:11px;background:#fff;cursor:pointer;font-size:0.74rem;font-weight:700;color:var(--text-muted);display:flex;align-items:center;justify-content:center;gap:5px;transition:all 0.16s;font-family:inherit;}
.tab-btn.active{border-color:var(--primary);background:rgba(13,148,136,0.08);color:var(--primary);}
.tab-btn i{font-size:0.82rem;}
.panel{padding-top:1rem;}
.hidden{display:none!important;}
.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:1rem 1.1rem;margin-bottom:12px;box-shadow:0 1px 3px rgba(15,23,42,0.03);}
.sec-label{font-size:0.72rem;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;display:flex;align-items:center;gap:7px;margin-bottom:0.7rem;}
.sec-label i{color:var(--primary);}
.empty{text-align:center;padding:2rem 1rem;color:var(--text-soft);font-size:0.85rem;}
.empty i{font-size:1.4rem;display:block;margin-bottom:8px;opacity:0.5;}
.ctl-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
select,input[type=date]{border:1.5px solid var(--border);border-radius:11px;padding:0.55rem 0.8rem;font-size:0.85rem;font-weight:600;color:var(--text-main);background:#fff;outline:none;font-family:inherit;}
.navbtn{width:36px;height:36px;border:1.5px solid var(--border);border-radius:11px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:0.9rem;}
.navbtn:hover{border-color:var(--primary);color:var(--primary);}
.wklbl{font-weight:800;font-size:0.84rem;flex:1;text-align:center;}
.pill-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.pill{padding:0.42rem 0.85rem;border:1.5px solid var(--border);border-radius:100px;background:#fff;cursor:pointer;font-size:0.77rem;font-weight:700;color:var(--text-muted);font-family:inherit;}
.pill.active{border-color:var(--primary);background:rgba(13,148,136,0.08);color:var(--primary);}

/* Live */
.live-emp{display:flex;align-items:center;gap:10px;padding:0.55rem 0;border-bottom:1px solid rgba(15,23,42,0.05);}
.live-emp:last-child{border-bottom:none;}
.live-dot{width:9px;height:9px;border-radius:50%;background:var(--success);flex-shrink:0;box-shadow:0 0 0 3px rgba(16,185,129,0.15);}
.live-name{font-weight:700;font-size:0.9rem;flex:1;}
.live-dept{font-size:0.72rem;color:var(--text-muted);background:#f1f5f9;padding:2px 8px;border-radius:6px;font-weight:600;}
.live-time{font-size:0.82rem;font-weight:700;color:var(--primary);font-variant-numeric:tabular-nums;}
.mgr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mgr-card{border:1px solid var(--border);border-radius:13px;padding:0.7rem 0.85rem;}
.mgr-card .d{font-weight:800;font-size:0.84rem;margin-bottom:3px;}
.mgr-card .s{font-size:0.74rem;font-weight:700;}
.s-on{color:var(--success);}.s-off{color:var(--text-soft);}

/* Live — admin üslubu (filial kartları) */
@keyframes livePulse{0%{box-shadow:0 0 0 0 rgba(99,102,241,0.4);}70%{box-shadow:0 0 0 6px rgba(99,102,241,0);}100%{box-shadow:0 0 0 0 rgba(99,102,241,0);}}
.live-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.live-head .lt{font-weight:800;font-size:0.96rem;}
.live-head .lc{font-size:0.78rem;color:var(--text-muted);font-weight:600;}
.live-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:0.68rem;color:var(--text-muted);font-weight:600;margin-top:8px;}
.live-legend span{display:flex;align-items:center;gap:4px;}
.ldot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.refresh-btn{margin-left:auto;border:none;background:var(--primary);color:#fff;font-weight:700;font-size:0.78rem;padding:0.5rem 0.9rem;border-radius:10px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;}
.dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:0.9rem;}
.dept-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:1.05rem;box-shadow:0 1px 3px rgba(15,23,42,0.03);}
.dept-head{display:flex;align-items:center;gap:8px;margin-bottom:0.8rem;padding-bottom:0.7rem;border-bottom:1px solid rgba(15,23,42,0.05);}
.dept-head .dn{font-weight:700;font-size:0.92rem;flex:1;}
.cnt-badge{background:rgba(16,185,129,0.08);color:#065f46;border:1px solid rgba(16,185,129,0.12);font-size:0.72rem;font-weight:700;padding:3px 9px;border-radius:100px;}
.cnt-badge.zero{background:rgba(15,23,42,0.03);color:var(--text-muted);border:1px solid var(--border);}
.mlr{display:flex;align-items:center;gap:9px;padding:0.6rem 0.7rem;border-radius:11px;margin-bottom:0.7rem;border:1px solid;}
.mlr.online{background:rgba(99,102,241,0.05);border-color:rgba(99,102,241,0.15);}
.mlr.offline{background:rgba(15,23,42,0.02);border-color:rgba(15,23,42,0.06);}
.mlr.left{background:rgba(245,158,11,0.05);border-color:rgba(245,158,11,0.15);}
.mld{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.mld.online{background:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.15);animation:livePulse 2s infinite;}
.mld.offline{background:#cbd5e1;}
.mld.left{background:#f59e0b;}
.mln{font-weight:700;font-size:0.84rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mln.online{color:#3730a3;}.mln.offline{color:var(--text-muted);}.mln.left{color:#92400e;}
.mlt{font-size:0.75rem;font-weight:700;font-family:monospace;white-space:nowrap;}
.mlt.online{color:#6366f1;}.mlt.left{color:#f59e0b;}
.mle{font-family:monospace;font-size:0.75rem;font-weight:700;background:rgba(99,102,241,0.08);color:#6366f1;border:1px solid rgba(99,102,241,0.12);padding:2px 7px;border-radius:6px;white-space:nowrap;}
.erow{display:flex;align-items:center;gap:10px;padding:0.55rem 0;}
.eav{width:33px;height:33px;border-radius:9px;background:rgba(99,102,241,0.07);border:1px solid rgba(99,102,241,0.06);display:flex;align-items:center;justify-content:center;font-weight:700;color:#6366f1;font-size:0.76rem;flex-shrink:0;}
.enm{flex:1;min-width:0;}
.enm .n{font-weight:600;font-size:0.87rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.enm .t{font-size:0.74rem;color:var(--text-muted);margin-top:1px;}
.eel{font-family:monospace;font-size:0.78rem;font-weight:700;background:rgba(16,185,129,0.06);color:#059669;border:1px solid rgba(16,185,129,0.1);padding:3px 8px;border-radius:7px;white-space:nowrap;}

/* Tables */
.dt{width:100%;border-collapse:collapse;font-size:0.8rem;}
.dt th{font-size:0.64rem;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px;padding:0.5rem 0.3rem;text-align:center;border-bottom:1.5px solid var(--border);}
.dt th:first-child{text-align:left;}
.dt td{padding:0.5rem 0.3rem;text-align:center;border-bottom:1px solid rgba(15,23,42,0.04);font-weight:600;}
.dt td:first-child{text-align:left;}
.dt tr:last-child td{border-bottom:none;}
.dt .nm{font-weight:700;font-size:0.84rem;}
.dt .dp{font-size:0.68rem;color:var(--text-muted);font-weight:600;}
.pctbox{display:inline-block;min-width:42px;padding:2px 7px;border-radius:7px;font-weight:800;font-size:0.78rem;}
.pct-hi{background:rgba(16,185,129,0.12);color:#059669;}
.pct-mid{background:rgba(245,158,11,0.14);color:#d97706;}
.pct-lo{background:rgba(239,68,68,0.1);color:#dc2626;}
.warn-row{display:flex;align-items:center;gap:9px;padding:0.5rem 0;border-bottom:1px solid rgba(15,23,42,0.05);}
.warn-row:last-child{border-bottom:none;}
.warn-badge{background:rgba(239,68,68,0.1);color:#dc2626;font-weight:800;font-size:0.76rem;padding:3px 9px;border-radius:7px;}

/* Cədvəl (compact, read-only) */
.cedvel-table{width:100%;table-layout:fixed;border-collapse:collapse;font-size:0.78rem;}
.cedvel-table th{padding:6px 2px;text-align:center;font-size:0.6rem;font-weight:800;color:var(--text-muted);text-transform:uppercase;border-bottom:1.5px solid var(--border);}
.cedvel-table th:first-child{text-align:left;width:24%;}
.cedvel-table td{padding:5px 2px;text-align:center;border-bottom:1px solid rgba(15,23,42,0.04);}
.cedvel-table td:first-child{text-align:left;font-weight:700;font-size:0.76rem;line-height:1.15;word-break:break-word;}
.cedvel-table tr:last-child td{border-bottom:none;}
.sb{display:inline-block;padding:2px 0;width:30px;border-radius:6px;font-size:0.66rem;font-weight:800;}
.sb-s{background:rgba(16,185,129,0.12);color:#059669;}
.sb-a{background:rgba(99,102,241,0.1);color:#4f46e5;}
.sb-f{background:rgba(245,158,11,0.13);color:#d97706;}
.sb-sf{background:rgba(20,184,166,0.1);color:#0d9488;}
.sb-i{background:rgba(239,68,68,0.08);color:#dc2626;}
.sb-x{color:var(--text-soft);}
.legend{display:flex;flex-wrap:wrap;gap:7px;margin-top:0.9rem;padding-top:0.8rem;border-top:1px solid var(--border);}

/* Waste */
.waste-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.6rem;}
.waste-dept{font-weight:800;font-size:0.92rem;}
.waste-pct{font-weight:900;font-size:1.05rem;font-variant-numeric:tabular-nums;}
.bar-bg{height:7px;background:rgba(15,23,42,0.06);border-radius:100px;overflow:hidden;margin:6px 0;}
.bar-fill{height:100%;border-radius:100px;transition:width 0.4s;}
.waste-sub{font-size:0.74rem;color:var(--text-muted);font-weight:600;}
.exc-badge{font-size:0.66rem;font-weight:800;padding:2px 8px;border-radius:6px;background:rgba(239,68,68,0.1);color:#dc2626;}
.ok-badge{font-size:0.66rem;font-weight:800;padding:2px 8px;border-radius:6px;background:rgba(16,185,129,0.1);color:#059669;}
.prod-line{display:flex;justify-content:space-between;font-size:0.76rem;padding:3px 0;color:var(--text-muted);font-weight:600;}

/* Checklist / training items */
.ck-item{display:flex;align-items:flex-start;gap:9px;padding:0.5rem 0;border-bottom:1px solid rgba(15,23,42,0.05);}
.ck-item:last-child{border-bottom:none;}
.ck-ic{flex-shrink:0;width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.72rem;margin-top:1px;}
.ck-on{background:rgba(16,185,129,0.12);color:#059669;}
.ck-off{background:rgba(239,68,68,0.08);color:#dc2626;}
.ck-txt{flex:1;font-size:0.84rem;font-weight:600;line-height:1.35;}
.ck-note{font-size:0.74rem;color:var(--text-muted);font-style:italic;margin-top:2px;}
.ck-time{font-size:0.7rem;color:var(--text-soft);font-weight:700;flex-shrink:0;}
.tlog{border:1px solid var(--border);border-radius:13px;padding:0.75rem 0.9rem;margin-bottom:9px;}
.tlog-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.tlog-emp{font-weight:800;font-size:0.88rem;}
.tlog-meta{font-size:0.72rem;color:var(--text-muted);font-weight:600;}
.score-chip{font-weight:900;font-size:0.82rem;padding:2px 9px;border-radius:7px;}
/* Mesaj qutuları + təsdiq çipləri */
.msg-box{background:#f8fafc;border:1px solid var(--border);border-radius:11px;padding:0.75rem 0.9rem;font-size:0.86rem;line-height:1.5;color:var(--text-main);white-space:pre-wrap;word-break:break-word;}
.msg-empty{color:var(--text-soft);font-style:italic;}
.ack-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:0.7rem;}
.ack-chip{font-size:0.71rem;font-weight:700;padding:3px 9px;border-radius:100px;display:inline-flex;align-items:center;gap:4px;}
.ack-on{background:rgba(16,185,129,0.1);color:#059669;border:1px solid rgba(16,185,129,0.15);}
.ack-off{background:rgba(15,23,42,0.04);color:var(--text-muted);border:1px solid var(--border);}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="topbar-row">
      <div class="brand"><i class="fa-solid fa-chart-line"></i> İcraçı Paneli <span class="who" id="whoName">—</span></div>
    </div>
    <div class="tabbar" id="tabbar">
      <button class="tab-btn active" data-t="live"      onclick="go('live')"><i class="fa-solid fa-tower-broadcast"></i> Canlı</button>
      <button class="tab-btn"        data-t="hesabat"   onclick="go('hesabat')"><i class="fa-solid fa-chart-column"></i> Hesabat</button>
      <button class="tab-btn"        data-t="cedvel"    onclick="go('cedvel')"><i class="fa-solid fa-calendar-week"></i> Cədvəl</button>
      <button class="tab-btn"        data-t="idareci"   onclick="go('idareci')"><i class="fa-solid fa-user-tie"></i> İdarəçilər</button>
      <button class="tab-btn"        data-t="checklist" onclick="go('checklist')"><i class="fa-solid fa-list-check"></i> Checklist</button>
      <button class="tab-btn"        data-t="tullanti"  onclick="go('tullanti')"><i class="fa-solid fa-trash-can"></i> Tullantı</button>
      <button class="tab-btn"        data-t="training"  onclick="go('training')"><i class="fa-solid fa-graduation-cap"></i> Training</button>
    </div>
  </div>

  <div id="panel-live"      class="panel"></div>
  <div id="panel-hesabat"   class="panel hidden"></div>
  <div id="panel-cedvel"    class="panel hidden"></div>
  <div id="panel-idareci"   class="panel hidden"></div>
  <div id="panel-checklist" class="panel hidden"></div>
  <div id="panel-tullanti"  class="panel hidden"></div>
  <div id="panel-training"  class="panel hidden"></div>
</div>

<script src="/gsr-shim.js"></script>
<script>
var EXEC_KEY  = '<?= execKey ?>';
var EXEC_NAME = '<?= execName ?>';
document.getElementById('whoName').textContent = EXEC_NAME;

// ── Köməkçilər ────────────────────────────────────────────────────
var DAY_AZ = ['B.e.','Ç.a.','Çər.','C.a.','Cüm.','Şən.','Baz.'];
var DEPTS  = ['Elmlər','Sahil','Gənclik','Ağ Şəhər'];
var SHIFT_MAP = {
  sehersm:{cls:'sb-s',lbl:'S'}, axsamsm:{cls:'sb-a',lbl:'A'}, fullsm:{cls:'sb-f',lbl:'AF'},
  seherfullsm:{cls:'sb-sf',lbl:'SF'}, istirahetsm:{cls:'sb-i',lbl:'İst'}, '':{cls:'sb-x',lbl:'–'}
};
function pad(n){ return String(n).padStart(2,'0'); }
function toYMD(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function todayYMD(){ return toYMD(new Date()); }
function monday(off){ var n=new Date(); var dw=n.getDay()||7; var m=new Date(n.getTime()-(dw-1)*86400000); m.setHours(0,0,0,0); m.setDate(m.getDate()+off*7); return m; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function spin(){ return '<div class="empty"><i class="fa-solid fa-circle-notch fa-spin"></i>Yüklənir...</div>'; }
function emptyMsg(m){ return '<div class="empty"><i class="fa-solid fa-inbox"></i>'+esc(m)+'</div>'; }
function pctCls(p){ return p>=90?'pct-hi':p>=70?'pct-mid':'pct-lo'; }
function call(fn,args,cb){
  var r=google.script.run.withSuccessHandler(cb).withFailureHandler(function(e){ console.error(fn,e); });
  r[fn].apply(r,args||[]);
}

// ── Tab keçidi ────────────────────────────────────────────────────
var loaded={};
function go(t){
  ['live','hesabat','cedvel','idareci','checklist','tullanti','training'].forEach(function(x){
    document.getElementById('panel-'+x).classList.toggle('hidden',x!==t);
  });
  Array.prototype.forEach.call(document.querySelectorAll('.tab-btn'),function(b){ b.classList.toggle('active',b.dataset.t===t); });
  LOADERS[t]();
}
var LOADERS={ live:loadLive, hesabat:loadHesabat, cedvel:loadCedvel, idareci:loadIdareci, checklist:loadChecklist, tullanti:loadTullanti, training:loadTraining };

// ══ 1) CANLI EKRAN ════════════════════════════════════════════════
function loadLive(){
  var p=document.getElementById('panel-live');
  if(!p.querySelector('.dept-grid')) p.innerHTML=spin();
  var online=null, mgrs=null;
  var bc={'Elmlər':'#bfdbfe','Sahil':'#fbcfe8','Gənclik':'#bbf7d0','Ağ Şəhər':'#fef08a'};
  function done(){
    if(online===null||mgrs===null) return;
    var mgrOn=0; DEPTS.forEach(function(d){ if(mgrs[d]&&mgrs[d].isOnline) mgrOn++; });
    var total=online.length+mgrOn;
    var h='<div class="card"><div class="live-head"><div><div class="lt">Canlı Vəziyyət</div><div class="lc">Hazırda işdə olan — <b>'+total+' nəfər</b></div></div>'
      +'<button class="refresh-btn" onclick="loadLive()"><i class="fa-solid fa-rotate"></i> Yenilə</button></div>'
      +'<div class="live-legend"><span><i class="ldot" style="background:#6366f1;"></i>İdarəçi işdə</span><span><i class="ldot" style="background:#f59e0b;"></i>İdarəçi çıxıb</span><span><i class="ldot" style="background:#cbd5e1;"></i>İdarəçi gəlməyib</span></div></div>';
    h+='<div class="dept-grid">';
    DEPTS.forEach(function(dept){
      var be=online.filter(function(e){return e.dept===dept;});
      var mgr=mgrs[dept]||null;
      var tot=be.length+(mgr&&mgr.isOnline?1:0);
      h+='<div class="dept-card"><div class="dept-head"><span class="ldot" style="width:10px;height:10px;border-radius:3px;background:'+(bc[dept]||'#e2e8f0')+';"></span><span class="dn">'+esc(dept)+'</span>'
        +'<span class="cnt-badge'+(tot?'':' zero')+'">'+(tot?tot+' nəfər':'0')+'</span></div>';
      if(mgr){
        var st=mgr.isOnline?'online':(mgr.hadGelis?'left':'offline');
        h+='<div class="mlr '+st+'"><div class="mld '+st+'"></div>'
          +'<i class="fa-solid fa-user-tie" style="font-size:0.76rem;flex-shrink:0;color:'+(st==='online'?'#6366f1':st==='left'?'#f59e0b':'#94a3b8')+';"></i>'
          +'<div class="mln '+st+'">'+esc(mgr.mgrName)+'</div>';
        if(st==='online') h+='<div class="mlt online"><i class="fa-regular fa-clock" style="opacity:0.6;margin-right:2px;"></i>'+esc(mgr.gelis)+'</div><div class="mle" data-ci="'+mgr.gelisMs+'">--:--</div>';
        else if(st==='left') h+='<div class="mlt left"><i class="fa-solid fa-right-from-bracket" style="margin-right:3px;opacity:0.6;"></i>'+esc(mgr.cixis)+'</div>';
        else h+='<span style="font-size:0.75rem;color:#94a3b8;font-weight:600;">İşdə deyil</span>';
        h+='</div>';
      }
      if(!be.length){ h+='<div style="text-align:center;padding:0.7rem 0;color:var(--text-soft);font-size:0.82rem;">Heç kim yoxdur</div>'; }
      else be.forEach(function(emp,idx){

function exToggle(uid){ var d=document.getElementById('det-'+uid),ic=document.getElementById('ico-'+uid); if(!d)return; var open=d.style.maxHeight&&d.style.maxHeight!=='0px'; d.style.maxHeight=open?'0px':d.scrollHeight+200+'px'; if(ic)ic.style.transform=open?'':'rotate(180deg)'; }

// İmtahan kartı — klikləyəndə suallar/cavablar açılır (oxu-yalnız)
function examCardExec(exam,uid){
  var sc=Number(exam.score)||0, mx=Number(exam.max_score)||0, pc=mx>0?Math.round(sc/mx*100):0;
  var col=pc>=80?'#059669':pc>=60?'#d97706':'#dc2626';
  var bg =pc>=80?'rgba(16,185,129,0.12)':pc>=60?'rgba(245,158,11,0.14)':'rgba(239,68,68,0.1)';
  var time=exam.created_at?new Date(exam.created_at).toLocaleTimeString('az-AZ',{hour:'2-digit',minute:'2-digit'}):'';
  var ans=Array.isArray(exam.answers)?exam.answers:[];
  var rows=ans.map(function(a){
    var isTest=a.type==='test', isPend=!isTest&&a.passed===null, ok=a.passed;
    var ibg=isPend?'rgba(245,158,11,0.1)':ok?'rgba(16,185,129,0.12)':'rgba(239,68,68,0.07)';
    var icn=isPend?'fa-clock':ok?'fa-check':'fa-xmark';
    var icl=isPend?'#d97706':ok?'#10b981':'#ef4444';
    var tcl=isPend?'var(--text-muted)':ok?'var(--text-main)':'var(--danger)';
    var info='';
    if(isTest&&a.given) info='<div style="font-size:0.74rem;color:var(--text-muted);margin-top:2px;">Cavab: <b>'+esc(a.given)+'</b>'+(a.given!==a.correct?' (Düzgün: <b style="color:#059669">'+esc(a.correct)+'</b>)':'')+'</div>';
    else if(!isTest&&a.givenText) info='<div style="font-size:0.78rem;color:var(--text-muted);margin-top:4px;background:rgba(15,23,42,0.03);border-radius:7px;padding:5px 8px;line-height:1.45;">'+esc(a.givenText)+'</div>';
    return '<div style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid rgba(15,23,42,0.04);"><div style="width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;background:'+ibg+';"><i class="fa-solid '+icn+'" style="font-size:0.6rem;color:'+icl+'"></i></div><div style="flex:1;min-width:0;"><div style="font-size:0.83rem;font-weight:600;color:'+tcl+';">'+esc(a.text)+'</div>'+info+'</div><span style="font-size:0.65rem;color:var(--text-soft);white-space:nowrap;padding-top:3px;">'+esc(a.category||'')+'</span></div>';
  }).join('');
  return '<div class="tlog" style="padding:0;"><div onclick="exToggle(\''+uid+'\')" style="cursor:pointer;padding:0.75rem 0.9rem;"><div class="tlog-head"><span class="tlog-emp">'+esc(exam.emp_name||'—')+'</span><span class="tlog-meta">'+esc(exam.dept||'')+' · '+time+'</span></div><div style="display:flex;align-items:center;gap:9px;margin-top:6px;"><div style="flex:1;height:5px;background:rgba(15,23,42,0.07);border-radius:100px;overflow:hidden;"><div style="height:100%;width:'+pc+'%;background:'+col+';border-radius:100px;"></div></div><span class="score-chip" style="background:'+bg+';color:'+col+';">'+sc+'/'+mx+' ('+pc+'%)</span><i class="fa-solid fa-chevron-down" id="ico-'+uid+'" style="font-size:0.72rem;color:var(--text-soft);transition:transform 0.25s;flex-shrink:0;"></i></div></div><div id="det-'+uid+'" style="overflow:hidden;max-height:0;transition:max-height 0.35s ease;"><div style="padding:0 0.9rem 0.8rem;">'+(rows||'<div style="font-size:0.82rem;color:var(--text-soft);padding-top:8px;">Cavab məlumatı yoxdur.</div>')+(exam.note?'<div class="ck-note" style="margin-top:8px;">📝 '+esc(exam.note)+'</div>':'')+'</div></div></div>';
}

// Təlim logu kartı — klikləyəndə bəndlər açılır
function logCardExec(log,uid){
  var items=Array.isArray(log.items)?log.items:[], done=items.filter(function(i){return i&&i.checked;}).length, total=items.length;
  var pc=total?Math.round(done/total*100):0, clr=pc>=80?'#059669':pc>=50?'#d97706':'#dc2626';
  var time=log.created_at?new Date(log.created_at).toLocaleTimeString('az-AZ',{hour:'2-digit',minute:'2-digit'}):'';
  var rows=items.map(function(item){ var ok=item&&item.checked;
    return '<div style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid rgba(15,23,42,0.04);"><div style="width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;background:'+(ok?'rgba(16,185,129,0.12)':'rgba(239,68,68,0.07)')+';"><i class="fa-solid '+(ok?'fa-check':'fa-xmark')+'" style="font-size:0.6rem;color:'+(ok?'#10b981':'#ef4444')+'"></i></div><div style="flex:1;"><div style="font-size:0.83rem;font-weight:600;color:'+(ok?'var(--text-main)':'var(--danger)')+';">'+esc(item.text)+'</div>'+(item.note?'<div style="font-size:0.76rem;color:#92400e;background:rgba(245,158,11,0.07);border-radius:6px;padding:3px 7px;margin-top:3px;">'+esc(item.note)+'</div>':'')+'</div><span style="font-size:0.68rem;color:var(--text-soft);white-space:nowrap;padding-top:2px;">'+esc(item.category||'')+'</span></div>';
  }).join('');
  return '<div class="tlog" style="padding:0;"><div onclick="exToggle(\''+uid+'\')" style="cursor:pointer;padding:0.75rem 0.9rem;"><div class="tlog-head"><span class="tlog-emp">'+esc(log.emp_name||'—')+'</span><span class="tlog-meta">'+esc(log.dept||'')+' · '+time+'</span></div><div style="display:flex;align-items:center;gap:9px;margin-top:6px;"><div style="flex:1;height:5px;background:rgba(15,23,42,0.07);border-radius:100px;overflow:hidden;"><div style="height:100%;width:'+pc+'%;background:'+clr+';border-radius:100px;"></div></div><span style="font-size:0.78rem;font-weight:700;color:'+clr+';white-space:nowrap;"><i class="fa-solid fa-check-double"></i> '+done+'/'+total+'</span><i class="fa-solid fa-chevron-down" id="ico-'+uid+'" style="font-size:0.72rem;color:var(--text-soft);transition:transform 0.25s;flex-shrink:0;"></i></div><div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px;">Treynər: '+esc(log.trainer_name||'')+'</div></div><div id="det-'+uid+'" style="overflow:hidden;max-height:0;transition:max-height 0.35s ease;"><div style="padding:0 0.9rem 0.8rem;">'+(rows||'<div style="font-size:0.82rem;color:var(--text-soft);padding-top:8px;">Bənd yoxdur.</div>')+(log.general_note?'<div class="ck-note" style="margin-top:8px;">📝 '+esc(log.general_note)+'</div>':'')+'</div></div></div>';
}
